<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bgk" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bgk)"/>

  <!-- Title -->
  <text x="640" y="55" font-size="32" font-weight="800" fill="#fff" text-anchor="middle">SKILL.md 知识架构</text>
  <text x="640" y="85" font-size="16" fill="#94a3b8" text-anchor="middle">1200+ 行 · 从华为官方文档提取的实质知识</text>

  <!-- Center node -->
  <circle cx="640" cy="380" r="65" fill="#7c3aed" opacity="0.9"/>
  <text x="640" y="372" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">HarmonyOS</text>
  <text x="640" y="394" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">NEXT</text>

  <!-- Category nodes with connections -->
  <!-- 1. ArkTS Language (top-left) -->
  <line x1="590" y1="340" x2="280" y2="180" stroke="#00d4ff" stroke-width="1.5" opacity="0.4"/>
  <rect x="140" y="130" width="280" height="100" rx="14" fill="#1e293b" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="280" y="160" font-size="17" font-weight="700" fill="#00d4ff" text-anchor="middle">ArkTS 语言</text>
  <text x="280" y="183" font-size="12" fill="#94a3b8" text-anchor="middle">严格模式 · 命名规范 · 10条性能规则</text>
  <text x="280" y="203" font-size="12" fill="#94a3b8" text-anchor="middle">TypedArray · const优化 · 编码风格</text>
  <text x="280" y="223" font-size="12" fill="#94a3b8" text-anchor="middle">V2装饰器 · @Sendable · @Concurrent</text>

  <!-- 2. ArkUI Components (top-right) -->
  <line x1="695" y1="330" x2="1000" y2="180" stroke="#3fb950" stroke-width="1.5" opacity="0.4"/>
  <rect x="860" y="130" width="280" height="100" rx="14" fill="#1e293b" stroke="#3fb950" stroke-width="1.5"/>
  <text x="1000" y="160" font-size="17" font-weight="700" fill="#3fb950" text-anchor="middle">ArkUI 组件</text>
  <text x="1000" y="183" font-size="12" fill="#94a3b8" text-anchor="middle">7个生命周期 · 6种布局容器 · 性能对比</text>
  <text x="1000" y="203" font-size="12" fill="#94a3b8" text-anchor="middle">@Reusable(69%提速) · LazyForEach</text>
  <text x="1000" y="223" font-size="12" fill="#94a3b8" text-anchor="middle">animateTo · 共享元素转场 · 弹簧曲线</text>

  <!-- 3. State Management (left) -->
  <line x1="575" y1="380" x2="280" y2="345" stroke="#f59e0b" stroke-width="1.5" opacity="0.4"/>
  <rect x="80" y="290" width="280" height="100" rx="14" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="220" y="320" font-size="17" font-weight="700" fill="#f59e0b" text-anchor="middle">状态管理</text>
  <text x="220" y="343" font-size="12" fill="#94a3b8" text-anchor="middle">V1: @State @Prop @Link @Observed</text>
  <text x="220" y="363" font-size="12" fill="#94a3b8" text-anchor="middle">V2: @Local @ObservedV2 @Trace @Monitor</text>
  <text x="220" y="383" font-size="12" fill="#94a3b8" text-anchor="middle">观察深度规则 · @Prop深拷贝 · 性能指导</text>

  <!-- 4. Navigation (right) -->
  <line x1="705" y1="380" x2="1000" y2="345" stroke="#ec4899" stroke-width="1.5" opacity="0.4"/>
  <rect x="920" y="290" width="280" height="100" rx="14" fill="#1e293b" stroke="#ec4899" stroke-width="1.5"/>
  <text x="1060" y="320" font-size="17" font-weight="700" fill="#ec4899" text-anchor="middle">导航 &amp; 并发</text>
  <text x="1060" y="343" font-size="12" fill="#94a3b8" text-anchor="middle">NavPathStack 完整API · 路由拦截</text>
  <text x="1060" y="363" font-size="12" fill="#94a3b8" text-anchor="middle">TaskPool vs Worker · 优先级/分组</text>
  <text x="1060" y="383" font-size="12" fill="#94a3b8" text-anchor="middle">@Sendable共享堆(100x) · 3分钟限制</text>

  <!-- 5. Kits (bottom-left) -->
  <line x1="590" y1="425" x2="280" y2="530" stroke="#06b6d4" stroke-width="1.5" opacity="0.4"/>
  <rect x="80" y="470" width="280" height="100" rx="14" fill="#1e293b" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="220" y="500" font-size="17" font-weight="700" fill="#06b6d4" text-anchor="middle">50+ HarmonyOS Kits</text>
  <text x="220" y="523" font-size="12" fill="#94a3b8" text-anchor="middle">应用框架 · 应用服务 · 系统 · 媒体</text>
  <text x="220" y="543" font-size="12" fill="#94a3b8" text-anchor="middle">图形 · AI · 开发工具 · 全部import key</text>
  <text x="220" y="563" font-size="12" fill="#94a3b8" text-anchor="middle">PhotoViewPicker · CoreSpeechKit ASR</text>

  <!-- 6. Quality (bottom-right) -->
  <line x1="695" y1="425" x2="1000" y2="530" stroke="#f43f5e" stroke-width="1.5" opacity="0.4"/>
  <rect x="920" y="470" width="280" height="100" rx="14" fill="#1e293b" stroke="#f43f5e" stroke-width="1.5"/>
  <text x="1060" y="500" font-size="17" font-weight="700" fill="#f43f5e" text-anchor="middle">质量 &amp; 安全</text>
  <text x="1060" y="523" font-size="12" fill="#94a3b8" text-anchor="middle">崩溃分类 · ErrorObserver · HiAppEvent</text>
  <text x="1060" y="543" font-size="12" fill="#94a3b8" text-anchor="middle">4种后台任务 · 9种backgroundMode</text>
  <text x="1060" y="563" font-size="12" fill="#94a3b8" text-anchor="middle">10条安全规则 · arkxtest测试 · 16+断言</text>

  <!-- 7. Tooling (bottom-center) -->
  <line x1="640" y1="445" x2="640" y2="600" stroke="#a855f7" stroke-width="1.5" opacity="0.4"/>
  <rect x="460" y="600" width="360" height="80" rx="14" fill="#1e293b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="640" y="630" font-size="17" font-weight="700" fill="#a855f7" text-anchor="middle">工具链 &amp; 生态</text>
  <text x="640" y="653" font-size="12" fill="#94a3b8" text-anchor="middle">DevEco Studio 6.x · OHPM · ArkCompiler · hvigor · hdc</text>
  <text x="640" y="673" font-size="12" fill="#94a3b8" text-anchor="middle">30+最佳实践 · 10个Codelab · 培训认证 · 80+文档链接</text>
</svg>
