<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="50%" stop-color="#1a1f3a"/>
      <stop offset="100%" stop-color="#0d1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Grid decoration -->
  <g opacity="0.06" stroke="#00d4ff" stroke-width="1">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="256" y1="0" x2="256" y2="640"/>
    <line x1="512" y1="0" x2="512" y2="640"/>
    <line x1="768" y1="0" x2="768" y2="640"/>
    <line x1="1024" y1="0" x2="1024" y2="640"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="1100" cy="120" r="200" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.1"/>
  <circle cx="1150" cy="100" r="120" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.08"/>
  <circle cx="180" cy="520" r="150" fill="none" stroke="#10b981" stroke-width="1" opacity="0.08"/>

  <!-- Tag -->
  <rect x="80" y="80" width="200" height="36" rx="18" fill="none" stroke="url(#accent)" stroke-width="1.5"/>
  <text x="180" y="104" font-size="15" font-weight="600" fill="#00d4ff" text-anchor="middle">OPEN SOURCE · MIT</text>

  <!-- Main title -->
  <text x="80" y="195" font-size="64" font-weight="900" fill="#ffffff">HarmonyOS</text>
  <text x="80" y="270" font-size="64" font-weight="900" fill="url(#accent)">AI Skills</text>

  <!-- Subtitle -->
  <text x="80" y="325" font-size="24" font-weight="400" fill="#a8b3cf">鸿蒙开发知识包 · 让 11+ AI 编程工具真正"懂"鸿蒙</text>

  <!-- Description -->
  <text x="80" y="380" font-size="18" fill="#8b95b0">一份 Markdown 源文件 · 自动产出所有 AI 工具的配置</text>
  <text x="80" y="408" font-size="18" fill="#8b95b0">1200+ 行从官方文档提取的实质知识 · 不是泛泛的链接</text>

  <!-- Tool pills row 1 -->
  <g font-size="14" font-weight="600" fill="#e6edf3">
    <rect x="80" y="445" width="120" height="36" rx="8" fill="#1e2a47" stroke="#3d4a6b" stroke-width="1"/>
    <text x="140" y="468" text-anchor="middle">Claude Code</text>

    <rect x="210" y="445" width="80" height="36" rx="8" fill="#1e2a47" stroke="#3d4a6b" stroke-width="1"/>
    <text x="250" y="468" text-anchor="middle">Cursor</text>

    <rect x="300" y="445" width="85" height="36" rx="8" fill="#1e2a47" stroke="#3d4a6b" stroke-width="1"/>
    <text x="342" y="468" text-anchor="middle">Copilot</text>

    <rect x="395" y="445" width="80" height="36" rx="8" fill="#1e2a47" stroke="#3d4a6b" stroke-width="1"/>
    <text x="435" y="468" text-anchor="middle">Codex</text>

    <rect x="485" y="445" width="110" height="36" rx="8" fill="#1e2a47" stroke="#3d4a6b" stroke-width="1"/>
    <text x="540" y="468" text-anchor="middle">Gemini CLI</text>

    <rect x="605" y="445" width="95" height="36" rx="8" fill="#1e2a47" stroke="#3d4a6b" stroke-width="1"/>
    <text x="652" y="468" text-anchor="middle">Windsurf</text>
  </g>

  <!-- Tool pills row 2 -->
  <g font-size="14" font-weight="600" fill="#e6edf3">
    <rect x="80" y="491" width="95" height="36" rx="8" fill="#1e2a47" stroke="#3d4a6b" stroke-width="1"/>
    <text x="127" y="514" text-anchor="middle">Continue</text>

    <rect x="185" y="491" width="70" height="36" rx="8" fill="#1e2a47" stroke="#3d4a6b" stroke-width="1"/>
    <text x="220" y="514" text-anchor="middle">Cline</text>

    <rect x="265" y="491" width="90" height="36" rx="8" fill="#1e2a47" stroke="#3d4a6b" stroke-width="1"/>
    <text x="310" y="514" text-anchor="middle">ChatGPT</text>

    <rect x="365" y="491" width="95" height="36" rx="8" fill="#1e2a47" stroke="#3d4a6b" stroke-width="1"/>
    <text x="412" y="514" text-anchor="middle">DeepSeek</text>

    <rect x="470" y="491" width="80" height="36" rx="8" fill="#1e2a47" stroke="#3d4a6b" stroke-width="1"/>
    <text x="510" y="514" text-anchor="middle">Ollama</text>

    <rect x="560" y="491" width="90" height="36" rx="8" fill="#1e2a47" stroke="#3d4a6b" stroke-width="1"/>
    <text x="605" y="514" text-anchor="middle">+3 more</text>
  </g>

  <!-- Right side: Key numbers -->
  <text x="850" y="200" font-size="120" font-weight="900" fill="url(#accent)" opacity="0.9">1200+</text>
  <text x="850" y="245" font-size="22" fill="#a8b3cf">行知识 · 从官方文档提取</text>

  <text x="850" y="330" font-size="80" font-weight="900" fill="url(#green)" opacity="0.9">50+</text>
  <text x="1050" y="330" font-size="22" fill="#a8b3cf">Kits</text>

  <text x="850" y="420" font-size="80" font-weight="900" fill="#f59e0b" opacity="0.9">11+</text>
  <text x="1050" y="420" font-size="22" fill="#a8b3cf">AI 工具</text>

  <!-- GitHub URL -->
  <text x="850" y="520" font-size="16" font-weight="500" fill="#58a6ff">github.com/DengShiyingA/harmonyos-ai-skills</text>

  <!-- Bottom line -->
  <rect x="0" y="630" width="1280" height="10" fill="url(#accent)"/>
</svg>
